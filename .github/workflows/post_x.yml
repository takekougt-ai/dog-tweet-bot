name: Dog Photo X Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日朝7時JST
  workflow_dispatch:

jobs:
  post-x:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-genai requests requests-oauthlib

      - name: Run X bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_POSTED_FOLDER_ID: ${{ secrets.DRIVE_POSTED_FOLDER_ID }}
        run: python post_x.py

      - name: Commit updated log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_log.json
          git diff --staged --quiet || git commit -m "Update posted log"
          git push
